<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  .container{max-width:1100px;margin:0 auto;padding:24px 20px}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .top-bar h1{font-size:22px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:10px}
  .logo{width:28px;height:28px;background:#1D9E75;border-radius:6px;display:inline-flex;align-items:center;justify-content:center}
  .logo svg{width:16px;height:16px}
  .subtitle{font-size:12px;color:#888;margin-top:2px}
  .top-actions{display:flex;gap:8px;align-items:center}
  .btn-import{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;font-size:13px;cursor:pointer;border-radius:8px;border:1px solid #ddd;background:#fff;color:#333;font-weight:500;transition:all 0.15s}
  .btn-import:hover{background:#f5f5f5;border-color:#bbb}
  .btn-export{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;font-size:13px;cursor:pointer;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-weight:500;transition:background 0.15s}
  .btn-export:hover{background:#0F6E56}
  .filter-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap;background:#fff;padding:12px 16px;border-radius:10px;border:1px solid #eee}
  .filter-row label{font-size:12px;color:#888;font-weight:500}
  .filter-row select{font-size:13px;padding:5px 10px;height:34px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#333;cursor:pointer}
  .filter-row select:focus{outline:none;border-color:#1D9E75}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .metric{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #eee}
  .metric-label{font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
  .metric-value{font-size:24px;font-weight:700}
  .metric-note{font-size:11px;color:#aaa;margin-top:2px}
  .metric-value.inc{color:#1D9E75}.metric-value.exp{color:#E24B4A}
  .add-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:18px;border:1px solid #eee}
  .add-section-title{font-size:12px;color:#888;font-weight:500;margin-bottom:10px}
  .add-row{display:grid;grid-template-columns:1fr 100px 100px 100px 90px auto;gap:8px;align-items:end}
  .fg label{font-size:11px;color:#888;display:block;margin-bottom:4px;font-weight:500}
  .fg input,.fg select{width:100%;height:36px;padding:0 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;color:#333;background:#fff}
  .fg input:focus,.fg select:focus{outline:none;border-color:#1D9E75}
  .add-btn{height:36px;padding:0 18px;font-size:13px;white-space:nowrap;cursor:pointer;background:#378ADD;border:none;border-radius:8px;color:#fff;font-weight:600;transition:background 0.15s}
  .add-btn:hover{background:#185FA5}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .card{background:#fff;border:1px solid #eee;border-radius:12px;padding:16px}
  .card-title{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
  .full-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:16px;margin-bottom:14px}
  .tx-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  .tx-table th{color:#999;font-weight:500;padding:6px 8px;border-bottom:1px solid #f0f0f0;text-align:left;font-size:12px}
  .tx-table td{padding:8px 8px;border-bottom:1px solid #f7f7f7;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tx-table tr:hover td{background:#fafafa}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500}
  .badge.inc{background:#E1F5EE;color:#0F6E56}.badge.exp{background:#FDECEA;color:#C0392B}
  .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0;line-height:1;transition:color 0.15s}
  .del-btn:hover{color:#E24B4A}
  .top10-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
  .top10-bar-bg{flex:1;height:6px;background:#f0f0f0;border-radius:3px}
  .top10-bar{height:6px;border-radius:3px;background:#E24B4A;transition:width 0.4s}
  .top10-name{width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333}
  .top10-amt{width:80px;text-align:right;color:#999;font-size:12px}
  .toast{position:fixed;bottom:24px;right:24px;font-size:13px;padding:10px 20px;border-radius:10px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
  .toast.show{opacity:1}
  .save-indicator{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
  .save-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;display:inline-block}
  .hint-card{background:#f9f9f7;border:1px dashed #ddd;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .hint-card .card-title{margin-bottom:8px}
  code{font-family:'Courier New',monospace;font-size:12px;background:#eee;padding:2px 6px;border-radius:4px;color:#555}
  .legend-row{display:flex;gap:14px;margin-bottom:8px;font-size:12px;color:#888}
  .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  @media(max-width:700px){
    .charts-row{grid-template-columns:1fr}
    .add-row{grid-template-columns:1fr 1fr}
    .summary-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="container">

  <div class="top-bar">
    <div>
      <h1>
        <span class="logo"><svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2"><path d="M3 8h10M3 5h6M3 11h8"/></svg></span>
        가계부 대시보드
      </h1>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <span class="subtitle" id="last-update"></span>
        <span class="save-indicator"><span class="save-dot"></span>자동 저장 중</span>
      </div>
    </div>
    <div class="top-actions">
      <label class="btn-import">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12v1h10v-1"/></svg>
        CSV 가져오기
        <input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSV(this)"/>
      </label>
      <button class="btn-export" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3"/><path d="M3 12v1h10v-1"/></svg>
        CSV 내보내기
      </button>
    </div>
  </div>

  <div class="filter-row">
    <label>연도</label>
    <select id="sel-year" onchange="applyFilter()"></select>
    <label>월</label>
    <select id="sel-month" onchange="applyFilter()">
      <option value="0">전체</option>
      <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
      <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
      <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
    <label>카테고리</label>
    <select id="sel-cat" onchange="applyFilter()">
      <option value="">전체</option>
      <option>식비</option><option>교통</option><option>쇼핑</option><option>의료</option>
      <option>여가</option><option>월급</option><option>부업</option><option>통신비</option><option>기타</option>
    </select>
    <button class="btn-import" onclick="resetData()" style="margin-left:auto;font-size:12px;height:30px;padding:0 12px;color:#E24B4A;border-color:#fcc">초기화</button>
  </div>

  <div class="summary-grid">
    <div class="metric"><div class="metric-label">수입 합계</div><div class="metric-value inc" id="s-inc">₩0</div><div class="metric-note" id="s-inc-note"></div></div>
    <div class="metric"><div class="metric-label">지출 합계</div><div class="metric-value exp" id="s-exp">₩0</div><div class="metric-note" id="s-exp-note"></div></div>
    <div class="metric"><div class="metric-label">잔액</div><div class="metric-value" id="s-bal">₩0</div><div class="metric-note" id="s-bal-note"></div></div>
  </div>

  <div class="add-section">
    <div class="add-section-title">+ 새 거래 추가</div>
    <div class="add-row">
      <div class="fg"><label>날짜</label><input type="date" id="inp-date"/></div>
      <div class="fg"><label>항목명</label><input type="text" id="inp-name" placeholder="예: 점심 식사"/></div>
      <div class="fg"><label>금액 (원)</label><input type="number" id="inp-amt" placeholder="50000" min="0"/></div>
      <div class="fg"><label>카테고리</label>
        <select id="inp-cat2">
          <option>식비</option><option>교통</option><option>쇼핑</option><option>의료</option>
          <option>여가</option><option>월급</option><option>부업</option><option>통신비</option><option>기타</option>
        </select>
      </div>
      <div class="fg"><label>구분</label>
        <select id="inp-type2"><option value="expense">지출</option><option value="income">수입</option></select>
      </div>
      <button class="add-btn" onclick="addEntry()">추가</button>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">대분류별 지출 (상위 8개)</div>
      <div style="position:relative;height:240px"><canvas id="chart-cat" role="img" aria-label="카테고리별 지출 막대 차트">카테고리별 지출</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">상위 10개 거래항목</div>
      <div id="top10-list"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">월별 지출/수입 현황</div>
      <div class="legend-row">
        <span><span class="legend-dot" style="background:#1D9E75"></span>수입</span>
        <span><span class="legend-dot" style="background:#E24B4A"></span>지출</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="chart-monthly" role="img" aria-label="월별 수입/지출 막대 차트">월별 수입/지출</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">지출 카테고리 비율</div>
      <div style="position:relative;height:220px"><canvas id="chart-pie" role="img" aria-label="지출 카테고리 도넛 차트">지출 비율</canvas></div>
    </div>
  </div>

  <div class="full-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">최근 거래내역</div>
      <span style="font-size:12px;color:#aaa" id="tx-count"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="tx-table">
        <thead><tr>
          <th style="width:90px">날짜</th>
          <th>항목</th>
          <th style="width:80px">카테고리</th>
          <th style="width:110px;text-align:right">금액</th>
          <th style="width:60px">구분</th>
          <th style="width:36px"></th>
        </tr></thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>
  </div>

  <div class="hint-card">
    <div class="card-title">CSV 형식 안내</div>
    <p style="font-size:12px;color:#888;line-height:2">
      컬럼 순서: <code>날짜, 항목명, 금액, 카테고리, 구분</code><br>
      예시: <code>2026-02-01, 월급, 3200000, 월급, income</code><br>
      구분 값: <code>income</code> (수입) 또는 <code>expense</code> (지출) &nbsp;·&nbsp; 첫 행이 헤더이면 자동으로 건너뜁니다.
    </p>
  </div>

</div>

<script>
const fmt=v=>'₩'+Math.round(v).toLocaleString();
const today=new Date();
const STORAGE_KEY='kakeibo_entries_v1';
let catChart=null,monthlyChart=null,pieChart=null,nextId=1;

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      if(parsed.entries&&parsed.nextId){
        return{entries:parsed.entries,nextId:parsed.nextId};
      }
    }
  }catch(e){}
  return{
    entries:[
      {id:1,date:'2026-02-01',name:'2월 월급',amount:3200000,cat:'월급',type:'income'},
      {id:2,date:'2026-02-03',name:'마트 장보기',amount:87000,cat:'식비',type:'expense'},
      {id:3,date:'2026-02-05',name:'지하철 충전',amount:50000,cat:'교통',type:'expense'},
      {id:4,date:'2026-02-07',name:'카페',amount:24000,cat:'식비',type:'expense'},
      {id:5,date:'2026-02-10',name:'인터넷 요금',amount:33000,cat:'통신비',type:'expense'},
      {id:6,date:'2026-02-12',name:'쇼핑몰 구매',amount:145000,cat:'쇼핑',type:'expense'},
      {id:7,date:'2026-02-14',name:'병원비',amount:32000,cat:'의료',type:'expense'},
      {id:8,date:'2026-02-16',name:'영화',amount:28000,cat:'여가',type:'expense'},
      {id:9,date:'2026-02-18',name:'점심 식사',amount:18000,cat:'식비',type:'expense'},
      {id:10,date:'2026-02-20',name:'택시',amount:12000,cat:'교통',type:'expense'},
      {id:11,date:'2026-02-22',name:'부업 수입',amount:300000,cat:'부업',type:'income'},
      {id:12,date:'2026-01-01',name:'1월 월급',amount:3200000,cat:'월급',type:'income'},
      {id:13,date:'2026-01-05',name:'식료품',amount:95000,cat:'식비',type:'expense'},
      {id:14,date:'2026-01-10',name:'교통카드',amount:60000,cat:'교통',type:'expense'},
      {id:15,date:'2026-01-15',name:'의류 구매',amount:220000,cat:'쇼핑',type:'expense'},
      {id:16,date:'2026-01-20',name:'외식',amount:55000,cat:'식비',type:'expense'},
    ],
    nextId:17
  };
}

const saved=loadData();
let entries=saved.entries;
nextId=saved.nextId;

function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({entries,nextId}));}catch(e){}
}

function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#1D9E75':'#E24B4A';t.style.color='#fff';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

function exportCSV(){
  const bom='\uFEFF',header='날짜,항목명,금액,카테고리,구분\n';
  const rows=entries.map(e=>[e.date,`"${e.name}"`,e.amount,e.cat,e.type].join(',')).join('\n');
  const blob=new Blob([bom+header+rows],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='가계부_'+today.toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
  showToast('내보내기 완료! ('+entries.length+'건)');
}

function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      let start=0;
      const first=lines[0].split(',');
      if(isNaN(Number(first[2].trim()))||first[0].includes('날짜')||first[0].toLowerCase().includes('date'))start=1;
      const imported=[];let errors=0;
      for(let i=start;i<lines.length;i++){
        const cols=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||lines[i].split(',');
        const c=cols.map(x=>x.replace(/^"|"$/g,'').trim());
        const[date,name,amtStr,cat,type]=c;
        const amount=parseFloat(amtStr);
        if(!date||!name||isNaN(amount)||amount<=0){errors++;continue;}
        const t=(type||'').toLowerCase();
        imported.push({id:nextId++,date,name,amount,cat:cat||'기타',type:(t==='income'||t==='수입')?'income':'expense'});
      }
      if(!imported.length){showToast('가져올 데이터가 없습니다.',false);return;}
      entries=[...imported,...entries];
      saveData();initSelectors();applyFilter();
      showToast(`가져오기 완료! ${imported.length}건${errors?` (오류 ${errors}건 건너뜀)`:''}`);
    }catch(err){showToast('파일 읽기 오류',false);}
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function resetData(){
  if(!confirm('모든 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.'))return;
  localStorage.removeItem(STORAGE_KEY);location.reload();
}

function initSelectors(){
  const years=[...new Set(entries.map(e=>e.date.slice(0,4)))].sort().reverse();
  const sel=document.getElementById('sel-year');
  const prev=sel.value||String(today.getFullYear());
  sel.innerHTML='<option value="">전체</option>'+years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  sel.value=years.includes(prev)?prev:years[0]||'';
  document.getElementById('inp-date').value=today.toISOString().slice(0,10);
  document.getElementById('last-update').textContent='마지막 업데이트: '+today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
}

function getFiltered(){
  const yr=document.getElementById('sel-year').value;
  const mo=parseInt(document.getElementById('sel-month').value);
  const ct=document.getElementById('sel-cat').value;
  return entries.filter(e=>{
    if(yr&&!e.date.startsWith(yr))return false;
    if(mo&&parseInt(e.date.slice(5,7))!==mo)return false;
    if(ct&&e.cat!==ct)return false;
    return true;
  });
}

function applyFilter(){
  const f=getFiltered();
  updateSummary(f);renderTxTable(f);renderCatChart(f);renderTop10(f);renderMonthlyChart();renderPieChart(f);
}

function updateSummary(f){
  const inc=f.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp=f.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const bal=inc-exp;
  document.getElementById('s-inc').textContent=fmt(inc);
  document.getElementById('s-exp').textContent=fmt(exp);
  document.getElementById('s-bal').textContent=fmt(bal);
  document.getElementById('s-bal').style.color=bal>=0?'#1D9E75':'#E24B4A';
  document.getElementById('s-inc-note').textContent=f.filter(e=>e.type==='income').length+'건';
  document.getElementById('s-exp-note').textContent=f.filter(e=>e.type==='expense').length+'건';
}

function renderTxTable(f){
  const sorted=[...f].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  document.getElementById('tx-count').textContent='총 '+f.length+'건 중 최근 '+sorted.length+'건 표시';
  document.getElementById('tx-body').innerHTML=sorted.map(e=>`<tr>
    <td>${e.date}</td><td title="${e.name}">${e.name}</td><td>${e.cat}</td>
    <td style="text-align:right;font-weight:600;color:${e.type==='income'?'#1D9E75':'#E24B4A'}">${e.type==='income'?'+':'-'}${fmt(e.amount)}</td>
    <td><span class="badge ${e.type==='income'?'inc':'exp'}">${e.type==='income'?'수입':'지출'}</span></td>
    <td><button class="del-btn" onclick="delEntry(${e.id})" title="삭제">×</button></td>
  </tr>`).join('');
}

function renderCatChart(f){
  const cats={};f.filter(e=>e.type==='expense').forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amount});
  const s=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(catChart){catChart.destroy();catChart=null;}if(!s.length)return;
  catChart=new Chart(document.getElementById('chart-cat'),{type:'bar',
    data:{labels:s.map(x=>x[0]),datasets:[{data:s.map(x=>x[1]),backgroundColor:'#E24B4A',borderRadius:4,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},
      scales:{x:{ticks:{callback:v=>'₩'+(v/10000)+'만',font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{font:{size:12}},grid:{display:false}}}}
  });
}

function renderTop10(f){
  const s=[...f.filter(e=>e.type==='expense')].sort((a,b)=>b.amount-a.amount).slice(0,10);
  const max=s[0]?s[0].amount:1;
  document.getElementById('top10-list').innerHTML=s.length?s.map(e=>`<div class="top10-item">
    <span class="top10-name" title="${e.name}">${e.name}</span>
    <div class="top10-bar-bg"><div class="top10-bar" style="width:${Math.round(e.amount/max*100)}%"></div></div>
    <span class="top10-amt">${fmt(e.amount)}</span></div>`).join(''):'<p style="font-size:13px;color:#aaa;padding:8px 0">지출 내역이 없습니다.</p>';
}

function renderMonthlyChart(){
  const yr=document.getElementById('sel-year').value||String(today.getFullYear());
  const inc=Array(12).fill(0),exp=Array(12).fill(0);
  entries.filter(e=>!yr||e.date.startsWith(yr)).forEach(e=>{
    const m=parseInt(e.date.slice(5,7))-1;
    if(e.type==='income')inc[m]+=e.amount;else exp[m]+=e.amount;
  });
  if(monthlyChart){monthlyChart.destroy();monthlyChart=null;}
  monthlyChart=new Chart(document.getElementById('chart-monthly'),{type:'bar',
    data:{labels:['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
      datasets:[{label:'수입',data:inc,backgroundColor:'#1D9E75',borderRadius:3,borderSkipped:false},{label:'지출',data:exp,backgroundColor:'#E24B4A',borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},
      scales:{x:{ticks:{font:{size:11},autoSkip:false,maxRotation:0},grid:{display:false}},y:{ticks:{callback:v=>'₩'+(v/10000)+'만',font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}}}}
  });
}

function renderPieChart(f){
  const cats={};f.filter(e=>e.type==='expense').forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amount});
  const s=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  if(pieChart){pieChart.destroy();pieChart=null;}if(!s.length)return;
  pieChart=new Chart(document.getElementById('chart-pie'),{type:'doughnut',
    data:{labels:s.map(x=>x[0]),datasets:[{data:s.map(x=>x[1]),backgroundColor:['#E24B4A','#BA7517','#1D9E75','#378ADD','#993556','#639922','#534AB7','#888780'],borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{display:true,position:'right',labels:{font:{size:11},boxWidth:12,padding:8}},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}}}
  });
}

function addEntry(){
  const date=document.getElementById('inp-date').value;
  const name=document.getElementById('inp-name').value.trim();
  const amount=parseFloat(document.getElementById('inp-amt').value);
  const cat=document.getElementById('inp-cat2').value;
  const type=document.getElementById('inp-type2').value;
  if(!date||!name||!amount||amount<=0){alert('날짜, 항목명, 금액을 모두 입력해주세요.');return;}
  entries.unshift({id:nextId++,date,name,amount,cat,type});
  document.getElementById('inp-name').value='';
  document.getElementById('inp-amt').value='';
  saveData();applyFilter();showToast('항목이 추가되었습니다.');
}

function delEntry(id){
  if(!confirm('이 항목을 삭제할까요?'))return;
  entries=entries.filter(e=>e.id!==id);
  saveData();applyFilter();
}

initSelectors();
document.getElementById('sel-month').value=today.getMonth()+1;
applyFilter();
</script>
</body>
</html>
